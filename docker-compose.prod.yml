services:

  # ─── Caddy (HTTPS automático + reverse proxy) ─────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: payog_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx
    networks:
      - payog

  # ─── Nginx (serve arquivos estáticos e repassa PHP ao app) ────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: payog_nginx
    restart: unless-stopped
    volumes:
      - ./src:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - payog

  # ─── Aplicação Laravel (PHP-FPM) ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: payog_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payog

  # ─── MariaDB ──────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: payog_mariadb
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - payog

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: payog_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - payog

  # ─── Queue Worker ─────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: payog_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --timeout=90
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payog

  # ─── Scheduler ────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: payog_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payog

networks:
  payog:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
  caddy_data:
  caddy_config:
